services:
  ollama:
    image: ollama/ollama:latest
    container_name: loomin-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    image: loomin-backend
    container_name: loomin-backend
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_CHAT_MODEL=loomin-llama3
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      - SQLITE_PATH=/data/loomin.sqlite
      - DATA_DIR=/data
      - FAISS_INDEX_PATH=/data/faiss.index
      - FAISS_METADATA_PATH=/data/faiss_metadata.json
      - MAX_CONTEXT_TOKENS=4096
      - PIIS_TRUSTED_REGEXES=false
    volumes:
      - backend_data:/data
    ports:
      - "8000:8000"
    depends_on:
      - ollama

  frontend:
    image: loomin-frontend
    container_name: loomin-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  ollama_data:
    name: loomin-ollama-data
  backend_data:
    name: loomin-backend-data

